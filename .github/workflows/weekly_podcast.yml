name: Weekly Science Radar Podcast

on:
  schedule:
    # Every Tuesday at 01:00 UTC
    - cron: "0 1 * * 2"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Episode date (YYYY-MM-DD, default: today)"
        required: false
      force_regen:
        description: "Force regenerate even if already published"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate_podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run weekly pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RUN_DATE: ${{ github.event.inputs.run_date || '' }}
          FORCE_REGEN: ${{ github.event.inputs.force_regen || 'false' }}
          GITHUB_REPO: WenyueDai/science-radar-podcast
        run: python run_weekly.py

      - name: Build GitHub Pages site
        env:
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python tools/build_site.py

      - name: Upload MP3 as release asset
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          DATE="${RUN_DATE:-$(date -u +%Y-%m-%d)}"
          DATE="${DATE:-$(date -u +%Y-%m-%d)}"
          MP3="output/${DATE}/podcast_${DATE}.mp3"
          if [ -f "$MP3" ]; then
            gh release create "episode-${DATE}" "$MP3" \
              --title "Science Radar — ${DATE}" \
              --notes "Weekly science podcast episode." \
              2>/dev/null || \
            gh release upload "episode-${DATE}" "$MP3" --clobber
          fi

      - name: Clean up segments (temporary build artifacts)
        run: |
          DATE="${RUN_DATE:-$(date -u +%Y-%m-%d)}"
          DATE="${DATE:-$(date -u +%Y-%m-%d)}"
          rm -rf "output/${DATE}/segments" "output/${DATE}/ffmpeg_concat_list.txt" "output/${DATE}/transition_sfx.mp3"

      - name: Commit state + site changes (no MP3s, no segments)
        run: |
          git config user.name "Science Radar Bot"
          git config user.email "bot@science-radar"
          git add state/ data/analysis_cache/ docs/ output/
          git diff --staged --quiet || git commit -m "Episode $(date -u +%Y-%m-%d) [automated]"
          git pull --rebase
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
