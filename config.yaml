# Science Radar Podcast — Weekly Configuration
# Every week: hunt for papers that challenge consensus, open new frontiers,
# or link distant fields together. Source = ALL of science, not a fixed journal list.

timezone: "UTC"
lookback_days: 7  # past week

paths:
  data_dir: "data"
  output_dir: "output"
  state_dir: "state"

limits:
  max_papers_total: 35          # ~1h podcast
  max_papers_per_source: 4      # prevent any single source dominating
  max_papers_to_analyze: 60     # pre-filter before LLM to avoid free-tier rate limits

# Semantic Scholar — replaces the fixed high-impact journal list.
# Broad queries per scientific domain; no journal restrictions.
# Papers ranked by intellectual value (LLM lenses) not by journal prestige.
semantic_scholar:
  max_per_domain: 12         # papers fetched per domain query
  delay_sec: 1.2             # polite rate-limiting (S2 is free, ~1 req/sec)

# arXiv preprint categories — kept alongside Semantic Scholar
# Note: only valid leaf/sub-root categories work; "physics", "nlin", "econ", "eess" return 0
arxiv_categories:
  - "q-bio"           # Quantitative Biology
  - "cond-mat"        # Condensed Matter Physics
  - "astro-ph"        # Astrophysics
  - "cs.AI"           # Artificial Intelligence
  - "cs.LG"           # Machine Learning
  - "math-ph"         # Mathematical Physics
  - "quant-ph"        # Quantum Physics
  - "hep-ph"          # High Energy Physics — Phenomenology
  - "hep-th"          # High Energy Physics — Theory
  - "gr-qc"           # General Relativity & Quantum Cosmology

# RSS sources split into two tiers:
#   priority 1-2 = actual research papers with abstracts (primary source while S2 API pending)
#   priority 3   = science journalism (context/supplementary only)
rss_sources:
  # ── Open-access journals (return real papers with full abstracts) ───────────
  - name: "Science Advances"
    url: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=sciadv"
    priority: 1
  - name: "eLife"
    url: "https://elifesciences.org/rss/recent.xml"
    priority: 1
  - name: "PNAS"
    url: "https://www.pnas.org/rss/current.xml"
    priority: 1
  - name: "Nature Communications"
    url: "https://www.nature.com/ncomms.rss"
    priority: 1
  - name: "PLOS Biology"
    url: "https://journals.plos.org/plosbiology/feed/atom"
    priority: 1
  - name: "PLOS Medicine"
    url: "https://journals.plos.org/plosmedicine/feed/atom"
    priority: 1
  - name: "PLOS ONE"
    url: "https://journals.plos.org/plosone/feed/atom"
    priority: 2
  - name: "PeerJ"
    url: "https://peerj.com/articles/index.rss"
    priority: 2
  # ── Science journalism (supplementary context) ─────────────────────────────
  - name: "Quanta Magazine"
    url: "https://www.quantamagazine.org/feed/"
    priority: 3
  - name: "Nature News"
    url: "https://www.nature.com/nature.rss"
    priority: 3

podcast:
  voice: "en-GB-RyanNeural"
  voice_rate: "+20%"
  intro_text: >
    Welcome to Science Radar, your weekly digest of the most surprising,
    frontier-pushing, and cross-disciplinary discoveries from across all of science.
    This week we've found papers that challenge long-held assumptions, open doors
    to entirely new research directions, and connect ideas across fields in ways
    nobody expected. Let's dive in.
  outro_text: >
    That's Science Radar for this week. Every one of these papers is a reminder
    that the most interesting science often lives at the edges — where fields
    collide, where assumptions break, and where the next big question is just
    starting to take shape. Until next week, keep questioning everything.

llm:
  provider: "openrouter"
  api_key_env: "OPENROUTER_API_KEY"
  script_model: "google/gemini-2.0-flash-exp:free"
  analysis_model: "google/gemini-2.0-flash-exp:free"
  synthesis_model: "google/gemini-2.0-flash-exp:free"
  temperature: 0.3
  analysis_temperature: 0.1

# Scoring weights for the 3 intellectual lenses.
# Journal prestige is NOT a factor — intellectual value is the only criterion.
scoring:
  min_score: 0.5   # low enough to catch papers with 1+ signal keyword even if analysis is partial
  weights:
    contradicts_consensus: 3.0    # Challenges what we thought we knew
    new_frontier: 2.5             # Opens a genuinely new research direction
    cross_disciplinary: 2.0       # Bridges two distant fields
    influential_citations: 0.5    # Log-scaled S2 influential citations (quality proxy)
    open_access: 0.5              # Full text available = better analysis

# Terms in titles/abstracts that signal surprising or paradigm-shifting findings
signal_keywords:
  - "unexpected"
  - "surprising"
  - "contrary to"
  - "challenges"
  - "overturns"
  - "paradox"
  - "anomaly"
  - "first evidence"
  - "previously unknown"
  - "long-standing"
  - "rethink"
  - "surprisingly"
  - "counterintuitive"
  - "defies"
  - "contrary to expectation"
  - "never before"
  - "first observation"
  - "first direct"
  - "unexpectedly"
  - "novel mechanism"
  - "unprecedented"
  - "paradigm shift"
  - "contradicts"
